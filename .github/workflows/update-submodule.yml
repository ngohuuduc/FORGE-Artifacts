name: Update Submodule to Latest

on:
  workflow_dispatch:

jobs:
  update-submodule:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (no submodules)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          submodules: false

      - name: Init and update only top-level submodule
        run: |
          git submodule init dataset-curated
          git submodule update dataset-curated

      - name: Pull latest in submodule
        run: |
          cd dataset-curated
          git pull origin main

      - name: Commit and push
        run: |
          git config user.name "shenyimings"
          git config user.email "seuilping@outlook.com"
          if git diff --quiet; then
            echo "Submodule already up to date, nothing to commit."
            exit 0
          fi
          git add dataset-curated
          git commit -m "chore: update curated dataset to latest commit [skip ci]"
          git push
